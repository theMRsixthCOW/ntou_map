<script>
const map = new maplibregl.Map({
    style: `https://tiles.openfreemap.org/styles/bright`,//找中間
    center: [121.77559, 25.14939],               // Fixed: [lng, lat]
    zoom: 17,
    pitch: 45,
    bearing: 45,
    container: 'map',
    antialias: true
});

map.on('load', () => {
    map.addLayer({
        'id': '3d-buildings',
        'source': 'openmaptiles', // OpenFreeMap uses 'openmaptiles' as the source ID in their 'bright' style
        'source-layer': 'building',
        'type': 'fill-extrusion',
        'minzoom': 15,
        'paint': {
            'fill-extrusion-color': '#aaa',
            'fill-extrusion-height': ['get', 'render_height'],
            'fill-extrusion-base': ['get', 'render_min_height'],
            'fill-extrusion-opacity': 0.6
        }
    });
});

map.on('click', (e) => {//爲了看到lat 和long ， 暫時加這段code（2026-3-13）
                         // e.lngLat contains the longitude and latitude of the point clicked
  const { lng, lat } = e.lngLat;
  
  console.log(`Building/Location Coordinates:`);
  console.log(`Longitude: ${lng}`);
  console.log(`Latitude: ${lat}`);
  
                         // Optional: Create a popup to show it on the map too
                         // this popup is what i want , willl use it a low
  new maplibregl.Popup()
    .setLngLat(e.lngLat)
    .setHTML(`Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}`)
    .addTo(map);
});


//    "Building-to-Building"
let waypoints = [];

map.on('click', '3d-buildings', (e) => {
    const coords = e.lngLat;
    waypoints.push(`${coords.lng},${coords.lat}`);
    
    console.log("Added building to route:", coords);

    if (waypoints.length >= 2) {
        getRoute(waypoints);
    }
});


//        Fetch the OSM Route
async function getRoute(points) {
    const query = points.join(';');
    const url = `https://router.project-osrm.org/route/v1/foot/${query}?geometries=geojson&overview=full`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (!data.routes || data.routes.length === 0) {
            console.error("No route found");
            return;
        }
        const route = data.routes[0].geometry;

        // Update or add the route line to the map
        if (map.getSource('route')) {
            map.getSource('route').setData(route);
        } else {
            map.addSource('route', { type: 'geojson', data: route });
            map.addLayer({
                id: 'route-line',
                type: 'line',
                source: 'route',
                paint: { 'line-color': '#3887be', 'line-width': 5 }
            });
        }
    } catch (e) {
        console.error("Failed to fetch route", e);
    }
}

</script>
