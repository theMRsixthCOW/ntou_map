<html lang="en">
<head>
  <title>NTOU-3D-MAP</title>

  <link href="logo.png" rel="icon" type="image/png">
  <link rel="stylesheet" href="eye_style.css">
  <link rel="stylesheet" href="index.css">

  <style>
      body { margin: 0; padding: 0; }
      html, body, #map { height: 100%; }

</head>

<div id="map"></div>

<div class="search-container inputbar">
  <div id="fname-placeholder-wrapper" class="placeholder-wrapper">
    <div class="marquee-content">
      <span data-i18n="ADM or 行政大樓 or 1（地圖上的編號）"> ADM or 行政大樓 or 1（地圖上的編號） </span>
      <span data-i18n="ADM or 行政大樓 or 1（地圖上的編號）"> ADM or 行政大樓 or 1（地圖上的編號） </span>
    </div>
  </div>
  <input type="search" id="fname" autocomplete="off" oninput="handleSearchInput('fname')" onfocus="handleSearchInput('fname')" onblur="setTimeout(() => hideSuggestions('fname'), 200)" onkeypress="if(event.key === 'Enter') { findBuilding(); hideSuggestions('fname'); }">
  <button class="locate-btn" onclick="locateUser()" title="定位我的位置"><img src="icons/target.png" alt="locate me"></button>
  <button onclick="findBuilding()"><img src="https://icons.veryicon.com/png/o/miscellaneous/effevo/enter-12.png" alt="search"></button>
  <div id="fname-suggestions" class="suggestions-dropdown"></div>
</div>
<div class="search-container inputbar2">
  <input type="search" id="destination" autocomplete="off" placeholder="目的地（例如：圖書館或教授名字）" data-i18n="目的地（例如：圖書館或教授名字）" oninput="handleSearchInput('destination')" onfocus="handleSearchInput('destination')" onblur="setTimeout(() => hideSuggestions('destination'), 200)" onkeypress="if(event.key === 'Enter') { findRoute(); hideSuggestions('destination'); }">
  <button onclick="findRoute()"><img src="https://icons.veryicon.com/png/o/miscellaneous/effevo/enter-12.png" alt="search"></button>
  <div id="destination-suggestions" class="suggestions-dropdown"></div>
</div>

<input type="hidden" id="lat-input">
<input type="hidden" id="lng-input">
<input type="hidden" id="lat-destination">
<input type="hidden" id="lng-destination">


<img src="report.png" alt="report_window" title="聯絡我們" class="report-window-icon" onclick="openReportWindow() ">

<!-- Report / Contact Window -->
<div id="report-window" class="report-window">
  <div id="report-window-header" class="report-window-header">
    <span class="report-window-title" data-i18n="聯絡我們">聯絡我們</span>
    <img src="https://cdn-icons-png.flaticon.com/128/9068/9068699.png" class="report-close-btn" onclick="closeReportWindow()" title="關閉">
  </div>
  <div class="report-window-body">
    <div class="report-eye-container">
      <div class="eye-wrapper">
        <div class="eye-ball"></div>
      </div>
    </div>
    <div class="report-window-text">
      <p id="reporttext001" class="report-window-text001" data-i18n="> 有什麼事嗎？">&gt; 有什麼事嗎？</p>
      <p id="reporttext002" class="report-window-text002" data-i18n="> 請選擇類型：">&gt; 請選擇類型：</p>
    </div>
    <!-- Step 1: Topic selection buttons -->
    <div id="report-topic-buttons" class="report-topic-buttons">
      <button class="report-topic-btn" onclick="selectTopic('聯絡我們')" data-i18n="聯絡我們">聯絡我們</button>
      <button class="report-topic-btn" onclick="selectTopic('回報錯誤or建議')" data-i18n="回報錯誤 / 建議">回報錯誤 / 建議</button>
      <button class="report-topic-btn" onclick="selectTopic('我想要改造建築物')" data-i18n="我想改造建築物">我想改造建築物</button>
    </div>
    <!-- Step 2: Message input (hidden until topic is chosen) -->
    <div id="report-input-area" class="report-input-area" style="display:none;">
      <textarea id="report-message" class="report-textarea" placeholder="在這裡輸入你的訊息..." data-i18n="在這裡輸入你的訊息..."></textarea>
      <div class="report-actions">
        <button class="report-back-btn" onclick="resetReport()" data-i18n="← 返回">← 返回</button>
        <button class="report-send-btn" onclick="submitReport()" data-i18n="送出 ">送出 </button>
      </div>
    </div>
  </div>
</div>

<script src="eye_window.js"></script>
</body>
</html>
